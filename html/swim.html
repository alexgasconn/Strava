<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Strava Swim Performance Deck</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/style.css">

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body class="activity-page activity-swim-page">
    <div class="container activity-shell">
        <header class="activity-hero">
            <div class="activity-hero__copy">
                <span class="activity-hero__eyebrow">Swim activity</span>
                <h1 id="activity-page-title">Swim Activity</h1>
                <p id="activity-hero-description">Refined swim analysis built to surface the right context faster, with
                    cleaner sections and focus.</p>
            </div>
            <div class="activity-hero__meta">
                <div class="activity-hero__meta-top">
                    <span class="activity-hero__date" id="activity-hero-date">--</span>
                    <a id="activity-hero-strava-link" class="activity-hero__link" href="#" target="_blank"
                        rel="noreferrer">Open in Strava</a>
                </div>
                <div class="activity-hero__meta-grid">
                    <span class="activity-hero__badge" id="activity-hero-type">Type</span>
                    <span class="activity-hero__meta-item" id="activity-hero-gear">Gear</span>
                    <span class="activity-hero__meta-item" id="activity-hero-kudos">❤️ 0</span>
                    <span class="activity-hero__meta-item" id="activity-hero-comments">💬 0</span>
                </div>
            </div>
        </header>

        <!-- ======================================
         SECTION 1: OVERVIEW & QUICK STATS
         ====================================== -->
        <div id="activity-details-row" class="activity-details-row activity-overview-grid">
            <section class="activity-overview-card activity-overview-card--stats">
                <div class="activity-overview-card__label">Core metrics</div>
                <div id="activity-stats" class="activity-details-col"></div>
            </section>
            <section class="activity-overview-card activity-overview-card--advanced">
                <div class="activity-overview-card__label">Advanced signals</div>
                <div id="activity-advanced" class="activity-details-col"></div>
            </section>
        </div>

        <!-- ======================================
         SECTION 2: HEART RATE ZONES
         ====================================== -->
        <div id="hr-zones-section" class="data-section">
            <h3>Heart Rate Distribution</h3>
            <div class="chart-container-inner">
                <canvas id="hr-zones-chart"></canvas>
            </div>
        </div>

        <!-- ======================================
         SECTION 3: ROUTE MAP
         ====================================== -->
        <div id="activity-map-container" class="data-section">
            <h3>Route Map</h3>
            <div class="map-toolbar" style="margin-bottom: 0.75rem; flex-wrap: wrap;">
                <label>Map style:
                    <select id="activity-map-style">
                        <option value="osm">OpenStreetMap</option>
                        <option value="carto-light">Carto Light</option>
                        <option value="carto-dark">Carto Dark</option>
                        <option value="open-topo">OpenTopoMap</option>
                        <option value="esri-sat">Esri Satellite</option>
                    </select>
                </label>
                <label>Color by:
                    <select id="route-color-mode">
                        <option value="route">Route</option>
                        <option value="heartrate">Heart Rate</option>
                        <option value="cadence">Cadence</option>
                        <option value="altitude">Altitude</option>
                        <option value="speed">Speed</option>
                        <option value="pace">Pace</option>
                    </select>
                </label>
                <label class="map-toolbar__toggle"><input type="checkbox" id="show-weather-details"> Show weather
                    details</label>
            </div>
            <div id="activity-map"></div>
        </div>

        <div id="weather-analysis-section" class="data-section hidden">
            <h3>🌦️ Weather Analysis</h3>
            <div class="weather-analysis__body"></div>
        </div>

        <!-- ======================================
         SECTION 3: STROKE BREAKDOWN
         ====================================== -->
        <div id="stroke-section" class="data-section hidden">
            <!-- Will be populated if splits_swim data is available -->
        </div>

        <!-- ======================================
         SECTION 4: LAPS/INTERVALS
         ====================================== -->
        <div id="laps-section" class="data-section hidden">
            <h3>🏁 Laps</h3>
            <div class="table-container">
                <table id="laps-table" class="df-table"></table>
            </div>
        </div>

        <!-- ======================================
         SECTION 5: LAPS CHART
         ====================================== -->
        <div id="laps-chart-section" class="data-section hidden">
            <h3>Lap Pace Distribution</h3>
            <div class="chart-container-inner">
                <canvas id="laps-chart"></canvas>
            </div>
        </div>

        <!-- ======================================
         SECTION 8: STREAM CHARTS
         ====================================== -->
        <div id="stream-charts" class="charts-grid">
            <div class="chart-container">
                <canvas id="chart-heartrate"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="chart-cadence"></canvas>
            </div>
        </div>

        <!-- Close Button -->
        <button onclick="window.close()" style="margin-top: 20px;">Close</button>
    </div>

    <!-- Scripts -->
    <script type="module" src="../js/pages/swim/index.js"></script>

</body>

</html>
